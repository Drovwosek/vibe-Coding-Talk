<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="VPN box: готовая коробка для Windows и Mac">
  <title>VPN Box</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="box-page">
    <section class="hero-card" aria-labelledby="title">
      <div class="hero-kicker">готовая коробка</div>
      <h1 id="title">VPN Box</h1>
      <p class="hero-copy">Скачай коробку, запусти, и VPN будет готов к работе без лишних экранов и без админки.</p>

      <div class="download-grid" aria-label="Скачать коробку">
        <a class="download-button download-button--windows" href="/download/windows">
          <span class="download-button__label">Скачать для Windows</span>
          <span class="download-button__hint">zip с готовой коробкой</span>
        </a>
        <a class="download-button download-button--mac" href="/download/mac">
          <span class="download-button__label">Скачать для Mac</span>
          <span class="download-button__hint">zip с готовой коробкой</span>
        </a>
      </div>

      <div class="box-rail" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>

      <ul class="box-points" aria-label="Что внутри коробки">
        <li>Готовый профиль VPN</li>
        <li>Файл запуска под платформу</li>
        <li>Без лишней панели и лишних шагов</li>
      </ul>
    </section>
  </main>
</body>
</html>
